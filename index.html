const SALT_LEN = 16, NONCE_LEN = 12;

async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: salt, iterations: 600000, hash: "SHA-256" },
    keyMaterial, { name: "AES-GCM", length: 256 }, false, ["decrypt"]
  );
}

async function decrypt(password) {
  try {
    const raw = Uint8Array.from(atob(ENC), c => c.charCodeAt(0));
    const salt = raw.slice(0, SALT_LEN);
    const nonce = raw.slice(SALT_LEN, SALT_LEN + NONCE_LEN);
    const ct = raw.slice(SALT_LEN + NONCE_LEN);
    const key = await deriveKey(password, salt);
    const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv: nonce }, key, ct);
    return new TextDecoder().decode(pt);
  } catch(e) { return null; }
}

(function(){
  const overlay = document.getElementById('pwOverlay');
  const input = document.getElementById('pwInput');
  const err = document.getElementById('pwErr');
  const btn = document.getElementById('pwBtn');
  async function check() {
    btn.disabled = true;
    btn.textContent = '解密中...';
    err.textContent = '';
    const result = await decrypt(input.value);
    if (result) {
      window.DATA = JSON.parse(result);
      overlay.style.transition = 'opacity 0.3s';
      overlay.style.opacity = '0';
      setTimeout(() => { overlay.remove(); initCharts(); }, 300);
    } else {
      err.textContent = '密码错误';
      input.value = '';
      input.focus();
      btn.disabled = false;
      btn.textContent = '解锁';
    }
  }
  input.addEventListener('keydown', e => { if (e.key === 'Enter') check(); });
  btn.addEventListener('click', check);
  input.focus();
})();

function initCharts() {
const DATA = window.DATA;
// Pre-compute net changes
DATA.stocks.forEach(s => {
  s.net_change = s.participants.reduce((sum, p) => sum + p.change, 0);
  s.max_abs_participant = Math.max(...s.participants.map(p => Math.abs(p.change)));
});
DATA.stocks.sort((a, b) => b.max_abs_participant - a.max_abs_participant);

function formatNum(n) {
  const abs = Math.abs(n);
  if (abs >= 1e8) return (n / 1e8).toFixed(2) + '亿';
  if (abs >= 1e4) return (n / 1e4).toFixed(0) + '万';
  return n.toLocaleString();
}

// --- Stock Chart ---
const stockChart = echarts.init(document.getElementById('stockChart'));
const sorted = [...DATA.stocks].sort((a, b) => Math.abs(b.net_change) - Math.abs(a.net_change));
const names = sorted.map(s => (s.cn_name ? s.cn_name + ' ' : '') + s.stock_code);
const values = sorted.map(s => s.net_change);
const chartHeight = Math.max(600, sorted.length * 22 + 80);
document.getElementById('stockChart').style.height = chartHeight + 'px';
stockChart.resize();

stockChart.setOption({
  grid: { left: 200, right: 80, top: 10, bottom: 20 },
  xAxis: { type: 'value', axisLabel: { formatter: v => formatNum(v) }, splitLine: { lineStyle: { type: 'dashed', color: '#eee' } } },
  yAxis: { type: 'category', data: names.reverse(), axisLabel: { fontSize: 11 }, inverse: true },
  series: [{
    type: 'bar',
    data: values.reverse().map(v => ({ value: v, itemStyle: { color: v >= 0 ? '#16a34a' : '#dc2626' } })),
    label: { show: true, position: 'right', fontSize: 10, formatter: p => formatNum(p.value) },
    barMaxWidth: 16,
  }],
  tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' }, formatter: params => {
    const p = params[0];
    const dir = p.value >= 0 ? '增持' : '减持';
    const color = p.value >= 0 ? 'green' : 'red';
    return `<b>${p.name}</b><br/><span style="color:${color}">${dir} ${formatNum(p.value)} 股</span>`;
  }},
});

stockChart.on('click', params => {
  const stockName = params.name;
  const stock = DATA.stocks.find(s => (s.cn_name ? s.cn_name + ' ' : '') + s.stock_code === stockName);
  if (stock) showParticipantChart(stock);
});

// --- Participant Chart ---
const pChart = echarts.init(document.getElementById('participantChart'));
window.showParticipantChart = function(stock) {
  document.getElementById('stockChart').parentElement.style.display = 'none';
  document.getElementById('participantSection').style.display = 'block';
  document.getElementById('participantTitle').textContent =
    (stock.cn_name ? stock.cn_name + ' ' : '') + stock.stock_code + ' 参与者变动';
  document.getElementById('participantSubtitle').textContent =
    `共 ${stock.participant_count} 个参与者变动，净${stock.net_change >= 0 ? '增持' : '减持'} ${formatNum(stock.net_change)} 股`;

  const participants = [...stock.participants].sort((a, b) => Math.abs(b.change) - Math.abs(a.change));
  const pNames = participants.map(p => p.name);
  const pValues = participants.map(p => p.change);
  const pH = Math.max(400, participants.length * 24 + 60);
  document.getElementById('participantChart').style.height = pH + 'px';
  pChart.resize();

  pChart.setOption({
    grid: { left: 300, right: 80, top: 10, bottom: 20 },
    xAxis: { type: 'value', axisLabel: { formatter: v => formatNum(v) }, splitLine: { lineStyle: { type: 'dashed', color: '#eee' } } },
    yAxis: { type: 'category', data: pNames.reverse(), axisLabel: { fontSize: 11, width: 280, overflow: 'truncate' }, inverse: true },
    series: [{
      type: 'bar',
      data: pValues.reverse().map(v => ({ value: v, itemStyle: { color: v >= 0 ? '#16a34a' : '#dc2626' } })),
      label: { show: true, position: 'right', fontSize: 10, formatter: p => formatNum(p.value) },
      barMaxWidth: 16,
    }],
    tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' }, formatter: params => {
      const p = params[0];
      const s = stock.participants.find(x => x.name === p.name);
      return `<b>${p.name}</b><br/>${p.value >= 0 ? '增持' : '减持'} ${formatNum(p.value)} 股<br/>` +
        `${DATA['date_n1']}: ${formatNum(s.shares_n1)} → ${DATA['date_n']}: ${formatNum(s.shares_n)}`;
    }},
  });
  document.getElementById('participantSection').scrollIntoView({ behavior: 'smooth' });
}

window.showStockChart = function() {
  document.getElementById('stockChart').parentElement.style.display = 'block';
  document.getElementById('participantSection').style.display = 'none';
  stockChart.resize();
  document.getElementById('stockChart').parentElement.scrollIntoView({ behavior: 'smooth' });
};

// --- Summary Table ---
(function() {
  const tableSorted = [...DATA.stocks].sort((a, b) => Math.abs(b.net_change) - Math.abs(a.net_change));
  let html = '<table><thead><tr><th>股票</th><th>参与者数</th><th>净变动</th><th>最大单笔变动</th></tr></thead><tbody>';
  tableSorted.forEach(s => {
    const nc = s.net_change;
    const cls = nc >= 0 ? 'green' : 'red';
    const dir = nc >= 0 ? '+' : '';
    const maxP = s.participants.reduce((a, b) => Math.abs(a.change) > Math.abs(b.change) ? a : b);
    html += `<tr class="cursor" onclick="showParticipantChart(DATA.stocks.find(x=>x.stock_code==='${s.stock_code}'))">`;
    html += `<td>${s.cn_name || ''} <b>${s.stock_code}</b></td>`;
    html += `<td>${s.participant_count}</td>`;
    html += `<td class="${cls}">${dir}${formatNum(nc)}</td>`;
    html += `<td>${maxP.name.substring(0, 20)} <span class="${maxP.change >= 0 ? 'green' : 'red'}">${maxP.change >= 0 ? '+' : ''}${formatNum(maxP.change)}</span></td>`;
    html += '</tr>';
  });
  html += '</tbody></table>';
  document.getElementById('tableSection').innerHTML = html;
})();

window.addEventListener('resize', () => {
  stockChart.resize();
  if (document.getElementById('participantSection').style.display !== 'none') pChart.resize();
});
} // end initCharts
</script>
</body>
</html>
